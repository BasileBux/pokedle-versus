<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokédle test</title>
</head>
<body>
  <p>Status: <span id="status">disconnected</span></p>
  <p>Player ID: <span id="player-id">—</span></p>
  <button id="btn-send" disabled>Send "hello rust"</button>
  <pre id="log"></pre>

  <script>
    const ROOM_ID = "00000000-0000-0000-0000-000000000001";
    let playerId = null;

    const status  = document.getElementById("status");
    const playerIdEl = document.getElementById("player-id");
    const btnSend = document.getElementById("btn-send");
    const log     = document.getElementById("log");

    function appendLog(msg) {
      log.textContent += msg + "\n";
    }

    const ws = new WebSocket(`ws://localhost:8080/ws?room_id=${ROOM_ID}`);

    ws.onopen = () => {
      status.textContent = "connected";
      appendLog("WebSocket opened");
    };

    ws.onmessage = (event) => {
      console.log("Received:", event.data);
      const data = JSON.parse(event.data);
      appendLog("← " + JSON.stringify(data));

      if (data.type === "welcome") {
        playerId = data.player_id;
        playerIdEl.textContent = playerId;
        btnSend.disabled = false;
      }
    };

    ws.onclose = () => {
      status.textContent = "disconnected";
      btnSend.disabled = true;
      appendLog("WebSocket closed");
    };

    ws.onerror = (err) => {
      appendLog("Error: " + err);
    };

    btnSend.onclick = () => {
      const msg = JSON.stringify({
        type: "chat",
        room_id: ROOM_ID,
        player_id: playerId,
        text: "hello rust",
      });
      ws.send(msg);
      appendLog("→ " + msg);
    };
  </script>
</body>
</html>
