<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pokédle test</title>
  </head>
  <body>
    <p>Status: <span id="status">disconnected</span></p>
    <p>Player ID: <span id="player-id">—</span></p>
    <p>Room ID: <span id="room-id">—</span></p>
    <button id="btn-new-room">New Room</button>
    <p id="player-list"></p>

    <script>
      let room_id = null;
      let playerId = null;

      const status = document.getElementById("status");
      const playerIdEl = document.getElementById("player-id");
      const roomIdEl = document.getElementById("room-id");
      const btnSend = document.getElementById("btn-send");
      const playerList = document.getElementById("player-list");
      const btnNewRoom = document.getElementById("btn-new-room");

      const playerListArray = [];

      let ws = null;

      async function checkRoomId(room_id) {
        try {
          const response = await fetch(`/check-room?room_id=${room_id}`);
          const data = await response.json();
          if (data.exists) {
            return true;
          } else {
            return false;
          }
        } catch (err) {
          return false;
        }
      }

      async function init() {
        if (window.location.search.includes("room_id=")) {
          room_id = new URLSearchParams(window.location.search).get("room_id");
          let roomExists = await checkRoomId(room_id);
          if (roomExists) {
            btnNewRoom.disabled = true;
            ws = new WebSocket(`ws://localhost:8080/ws?room_id=${room_id}`);
            setupWebSocket(ws);
          } else {
            history.replaceState(null, "", window.location.pathname);
          }
        }
      }
      init();

      function setupWebSocket(ws) {
        ws.onopen = () => {
          status.textContent = "connected";
        };

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);

          if (data.type === "welcome") {
            playerId = data.player_id;
            playerIdEl.textContent = playerId;
            btnSend.disabled = false;
            btnNewRoom.disabled = true;
          }

          if (data.type === "player_list") {
            playerListArray.length = 0;
            data.players.forEach((p) => playerListArray.push(p));
            playerList.textContent = "Players:\n" + playerListArray.join("\n");
          }

          if (data.type === "player_joined") {
            if (!playerListArray.includes(data.player_id)) {
              playerListArray.push(data.player_id);
              playerList.textContent =
                "Players:\n" + playerListArray.join("\n");
            }
          }

          if (data.type === "player_left") {
            const index = playerListArray.indexOf(data.player_id);
            if (index !== -1) {
              playerListArray.splice(index, 1);
              playerList.textContent = "Players: " + playerListArray.join(", ");
            }
          }
        };

        ws.onclose = () => {
          status.textContent = "disconnected";
          btnSend.disabled = true;
          btnNewRoom.disabled = false;
        };

        ws.onerror = (err) => {};
      }

      btnNewRoom.onclick = () => {
        fetch("/new-room")
          .then((response) => response.json())
          .then((data) => {
            room_id = data.room_id;
            roomIdEl.textContent = room_id;
            history.replaceState(null, "", `?room_id=${room_id}`);
            ws = new WebSocket(`ws://localhost:8080/ws?room_id=${room_id}`);
            setupWebSocket(ws);
          });
      };
    </script>
  </body>
</html>
